# AMR Portal - dataset definitions
# Migrated from amr-portal/scripts/etl/amr_config_v3/data.json

- name: phenotype
  path: "/data/path/phenotype.parquet"
  create_columns:
    - name: gen_measurement
      command: "TRIM(CONCAT(measurement_sign, ' ', measurement, ' ', measurement_units))"
    - name: gen_antibiotic_ontology
      command: "CONCAT_WS('|', antibiotic_ontology, antibiotic_ontology_link)"

- name: genotype
  path: "/data/path/genotype.parquet"
  create_columns:
    - name: gen_antibiotic_ontology
      command: "CONCAT_WS('|', antibiotic_ontology, antibiotic_ontology_link)"
    - name: gen_evidence_accession
      command: "CONCAT_WS('|', evidence_accession, evidence_link)"
    - name: gen_annotation_link
      command: "CONCAT('Annotation','|','https://ftp.ebi.ac.uk/pub/databases/amr_portal/genomes/', IF(STARTS_WITH(assembly_id, 'ERZ'), concat_ws('/', assembly_ID[0:3], assembly_id[4:6], assembly_ID[7:9], assembly_id), CONCAT_WS('/', assembly_ID[0:3], assembly_ID[5:7], assembly_ID[8:10], assembly_ID)))"

- name: pheno_geno_merged
  path: "/data/path/pheno_geno_merged.parquet"
  create_columns:
    - name: gen_measurement
      command: "TRIM(CONCAT(measurement_sign, ' ', measurement, ' ', measurement_units))"
    - name: gen_antibiotic_ontology
      command: "CONCAT_WS('|', antibiotic_ontology, antibiotic_ontology_link)"
    - name: gen_evidence_accession
      command: "CONCAT_WS('|', evidence_accession, evidence_link)"
    - name: gen_annotation_link
      command: "CONCAT('Annotation','|','https://ftp.ebi.ac.uk/pub/databases/amr_portal/genomes/', IF(STARTS_WITH(assembly_id, 'ERZ'), concat_ws('/', assembly_ID[0:3], assembly_id[4:6], assembly_ID[7:9], assembly_id), CONCAT_WS('/', assembly_ID[0:3], assembly_ID[5:7], assembly_ID[8:10], assembly_ID)))"
